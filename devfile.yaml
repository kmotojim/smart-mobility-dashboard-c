schemaVersion: 2.2.2
metadata:
  name: smart-mobility-dashboard-cpp
  description: Smart Mobility Dashboard C++ Backend
components:
  - name: tools
    container:
      image: image-registry.openshift-image-registry.svc:5000/cluster-admin-devspaces/udi-cpp-dev:latest
      memoryLimit: 4Gi
      memoryRequest: 1Gi
      cpuLimit: '2'
      cpuRequest: '0.5'
      mountSources: true
      sourceMapping: /projects
      endpoints:
        - name: backend
          targetPort: 8080
          exposure: public
          protocol: https
commands:
  - id: build
    exec:
      label: "Build"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        rm -rf build && mkdir build && cd build && cmake .. && cmake --build . --parallel $(nproc)
      group:
        kind: build
        isDefault: true
  - id: run
    exec:
      label: "Run"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        ./build/smart-mobility-backend
      group:
        kind: run
        isDefault: true
  - id: build-and-run
    exec:
      label: "Build & Run"
      component: tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: |
        rm -rf build && mkdir build && cd build && cmake .. && cmake --build . --parallel $(nproc) && cd .. && ./build/smart-mobility-backend
